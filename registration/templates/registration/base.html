<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GK Exam 2026{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f6fa; color: #2c3e50; }

        /* NAVBAR */
        nav {
            background: #1a2740;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        nav .logo span { color: #4fc3f7; }
        nav a {
            color: #cfd8dc;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            transition: color 0.2s;
        }
        nav a:hover { color: white; }

        /* FOOTER */
        footer {
            background: #1a2740;
            color: #90a4ae;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            margin-top: 60px;
        }

        /* MAIN CONTENT */
        main { min-height: calc(100vh - 130px); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">GK <span>Exam</span> 2026</div>
        <div>
            <a href="/">Home</a>
            <a href="/register/">Register</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 GK Exam — Sunshine Academy, Pune | All rights reserved</p>
    </footer>
</body>
</html>
